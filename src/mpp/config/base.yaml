# ============================================================
# Base configuration (inherited by all task configs)
# Task-specific configs override individual values.
# ============================================================

mlflow:
  tracking_uri: "http://mlflow-server:5000"

data:
  batch_size: 800
  num_workers: 0
  input_type: "vecset"
  # target_type is set in the respective task config

training:
  n_trials: 50        # Number of Optuna trials for hyperparameter tuning
  tuning_epochs: 100     # Max. epochs per tuning trial
  final_epochs: 1000    # Max. epochs for the final best-model training
  tuning_patience: 10   # EarlyStopping patience during tuning
  final_patience: 50    # EarlyStopping patience during final training
  log_every_n_steps: 5
  weight_decay: 0.01
  gpu_id: 0             # GPU index (0 or 1)
